language: python
python:
  - 3.6
addons:
  postgresql: "9.4"
services:
- docker
- postgresql
before_install:
# https://docs.travis-ci.com/user/encrypting-files/
- openssl aes-256-cbc -K $encrypted_e0dc42b6c3ee_key -iv $encrypted_e0dc42b6c3ee_iv -in scripts/client_credentials.json.enc -out scripts/client_credentials.json -d
- curl -O https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-sdk-280.0.0-linux-x86_64.tar.gz
- tar zxf google-cloud-sdk-280.0.0-linux-x86_64.tar.gz google-cloud-sdk
- export CLOUDSDK_CORE_DISABLE_PROMPTS=1
- sh google-cloud-sdk/install.sh
- source google-cloud-sdk/path.bash.inc
- gcloud version
- if [ -a scripts/client_credentials.json ]; then 
    gcloud -q auth activate-service-account --key-file scripts/client_credentials.json;
  fi
install:
  - pip install -r requirements.txt 
before_script:
  - psql -c "CREATE DATABASE test_fondo_api;" -U postgres
  - psql -c "CREATE EXTENSION hstore;" -U postgres -d test_fondo_api
  - python3 manage.py migrate
env:
  global:
    - POSTGRES_DATABASE=test_fondo_api
    - POSTGRES_USER=postgres
    - POSTGRES_HOST=localhost
    - POSTGRES_PASSWORD=
    - POSTGRES_PORT=5432
    - DJANGO_SETTINGS_MODULE=api.settings.development
script:
  - coverage run --branch --source='.' manage.py test && coverage report -m --omit="*env*,*tests*,api/wsgi.py,fondo_api/apps.py,manage.py,*migrations*"
deploy:
- provider: script
  script: sh $TRAVIS_BUILD_DIR/scripts/trigger-deploy.sh
  skip_cleanup: true
  on:
    all_branches: true
    condition: $TRAVIS_BRANCH =~ ^(gcp|develop)$